---
all:
  children:
    windows:
      hosts:
        hiretrack-win:
          ansible_host: 100.100.139.110   # Tailscale IP
          ansible_user: Admin
          ansible_ssh_private_key_file: ~/.ssh/hiretrack_win
      vars:
        ansible_connection: ssh
        ansible_shell_type: powershell
        # Must be YAML null (not the string "None") so Ansible doesn't try to
        # prefix commands with a shell wrapper on Win32-OpenSSH.
        ansible_shell_executable: null
        ansible_port: 22
