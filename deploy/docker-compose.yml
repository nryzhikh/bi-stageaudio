# Shared json-file log rotation for every service in this stack. Docker's
# default json-file driver has NO size cap — on a small VPS the MySQL error
# loop plus the 15-minute sync-worker runs can easily add GB/week of log files
# under /var/lib/docker/containers. Anchor this once and alias into each
# service so rotation stays consistent and we don't drift per-service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:latest
    # Opt-in: start with `docker compose --profile proxy up -d` or
    # COMPOSE_PROFILES=proxy in .env. Plain `docker compose up -d` skips caddy,
    # which is useful while DNS isn't pointed at the VPS (Let's Encrypt cannot
    # issue certs for a raw IP, so auto-HTTPS fails and the browser hangs).
    profiles: ["proxy"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Managed TLS certs & runtime state live in named volumes so the
      # container never writes into the rsync-managed deploy tree.
      - caddy_data:/data
      - caddy_config:/config
      # Config-as-code: single file, read-only. Caddy cannot mutate the
      # surrounding ./caddy_config directory because we only bind the file.
      - ./caddy_config/Caddyfile:/etc/caddy/Caddyfile:ro


  mysql:
    image: mysql:8.0
    container_name: hiretrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # Loopback-only publish. In-compose consumers (sync-worker, superset,
    # cloudbeaver) reach MySQL over the compose network at host `mysql:3306`
    # and do NOT need this mapping. The 127.0.0.1 bind is kept purely so an
    # operator on the VPS can open an SSH tunnel for desktop clients:
    #   ssh -L 3306:127.0.0.1:3306 user@vps
    # Remove this line entirely to harden further.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    # No --default-authentication-plugin=mysql_native_password here: that plugin
    # is legacy and weak. MySQL 8.0 defaults to caching_sha2_password, which is
    # what we want. Clients that still need native_password can opt in per-user
    # via ALTER USER, rather than flipping the server-wide default.
    #
    # Binlog rationale (this stack has NO replica or PITR tooling):
    #   This node is a single-writer analytical replica that gets continuously
    #   re-synced from the upstream HireTrack API by the sync-worker. There is
    #   no MySQL replica, no CDC consumer, and no mysqldump+binlog PITR pipeline
    #   downstream — nothing reads the binlog. With the current sync config,
    #   tables not in `incremental:` get full-refresh on every 15-min run, which
    #   writes ~600 MB of INSERTs per cycle (≈2.4 GB/h) into an append-only
    #   journal that nothing consumes. On a 30 GB VPS that fills the disk in
    #   ~12 h regardless of `binlog-expire-logs-seconds`, because retention can
    #   only free *whole rotated files* and we generate them faster than the
    #   24 h window can release them.
    #
    # --skip-log-bin disables the binary log entirely. InnoDB's redo log (small,
    # bounded, circular) still guarantees crash recovery; we just stop keeping
    # an external journal of changes that no one replays. If a replica or PITR
    # tool is ever added, re-enable with bounded `--binlog-expire-logs-seconds`
    # AND fix the worker to stop full-refreshing on a sub-hour cadence —
    # otherwise the binlog will outpace any retention you can configure.
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --local-infile=0
      --skip-log-bin
    logging: *default-logging
    # MySQL 8.0 first-init on an empty volume routinely takes 30-90s before
    # the socket is open. Without `start_period`, the healthcheck retry budget
    # (5 * 10s = 50s) expires mid-init, compose marks the service unhealthy,
    # tears the dependency down, and SIGKILLs it after stop_grace_period →
    # exit 137. `start_period` excludes startup failures from the retry count,
    # `start_interval` polls fast during startup so we mark healthy ASAP, and
    # the bumped `stop_grace_period` lets a real shutdown actually flush.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
      start_interval: 5s
    stop_grace_period: 60s

  # CloudBeaver CE — web frontend for DBeaver. Replaces Adminer: real SQL
  # editor with autocomplete, schema browser, ER diagrams, query history,
  # and its own user/role layer so we never expose the MySQL port publicly.
  # Reach it via Caddy at db.stageaudio.cloud (proxy profile), or locally at
  # 127.0.0.1:8978. First run: open the URL → complete the admin wizard →
  # add a connection pointing at host `mysql`, port 3306.
  cloudbeaver:
    image: dbeaver/cloudbeaver:26.0.3
    container_name: hiretrack-cloudbeaver
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
    # Bind to loopback only. Public access is handled by Caddy → cloudbeaver:8978.
    ports:
      - "127.0.0.1:8978:8978"
    volumes:
      - cloudbeaver_workspace:/opt/cloudbeaver/workspace

  superset:
    image: apache/superset:4.1.2-dev
    container_name: hiretrack-superset
    restart: unless-stopped
    logging: *default-logging
    # Loopback-only: public access goes through Caddy → superset:8088 at
    # superset.stageaudio.cloud. Never expose :8088 to the internet directly
    # (no WAF, and Superset's own auth is not enough in front of the raw port).
    ports:
      - "127.0.0.1:8088:8088"
    depends_on:
      - mysql
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      TALISMAN_ENABLED: "false"
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - superset_data:/app/superset_home
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@stageaudio.cloud --password hs1AzRVc1OEjqfSWYhes || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
  # One-shot puller: streams data from the HireTrack Flask API on the Windows
  # host into this stack's MySQL. Manual and scheduled runs both use this
  # service definition via `docker compose run --rm sync-worker ...`.
  sync-worker:
    image: ${SYNC_CLIENT_IMAGE}
    # Platform is env-driven so the arm64 Mac can run the amd64 image under
    # emulation while the Linux VPS uses its native arch. Leave empty in
    # .env.production; set to `linux/amd64` in local dev envs until CI
    # publishes a multi-arch manifest.
    platform: ${SYNC_WORKER_PLATFORM:-}
    profiles: ["manual"]
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
    # Every runtime value is injected explicitly from the compose-level .env
    # (see deploy/env.*.example). No env_file on the service and no baked-in
    # defaults in the image: if a value is missing, compose fails to render
    # instead of silently pointing the worker at the wrong host or db.
    environment:
      # mysql is the in-network service name; never expose 3306 to the
      # internet for this consumer.
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      API_URL: ${API_URL:?API_URL is required}
      API_USERNAME: ${API_USERNAME:?API_USERNAME is required}
      API_PASSWORD: ${API_PASSWORD:?API_PASSWORD is required}
      TZ: ${TZ:-UTC}
    volumes:
      # Config is edited on the host so schedule/policy tweaks don't need
      # an image rebuild. Read-only prevents the container from scribbling back.
      - ./sync_config.yaml:/app/apps/sync-worker/sync_config.yaml:ro
      # Reports persist across container recreates. Incremental watermarks
      # are stored inside MySQL metadata table `_sync_table_state`.
      - sync_reports:/data/reports

  # Thin Docker CLI runner. Ofelia execs into this service and launches
  # one-shot `sync-worker` containers using the compose file in this directory.
  scheduler-runner:
    image: docker:28-cli
    restart: unless-stopped
    logging: *default-logging
    working_dir: ${DEPLOY_DIR:?DEPLOY_DIR is required}
    command: ["sh", "-lc", "while true; do sleep 3600; done"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_DIR}:${DEPLOY_DIR}
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.sync-incremental.schedule: "*/15 * * * *"
      ofelia.job-exec.sync-incremental.command: >-
        sh -lc 'docker compose --profile manual run --rm sync-worker --lock-timeout 0'
      ofelia.job-exec.sync-incremental.no-overlap: "true"
      ofelia.job-exec.sync-full-refresh.schedule: "0 3 * * 0"
      ofelia.job-exec.sync-full-refresh.command: >-
        sh -lc 'docker compose --profile manual run --rm sync-worker full-refresh --lock-timeout 0'
      ofelia.job-exec.sync-full-refresh.no-overlap: "true"

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: hiretrack-ofelia
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - scheduler-runner
    command: daemon --docker -f label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  caddy_data:
  caddy_config:
  # postgres_data:
  superset_data:
  # grafana_data:
  mysql_data:
  sync_reports:
  cloudbeaver_workspace:
