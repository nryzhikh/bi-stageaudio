  #     GF_SECURITY_ADMIN_USER: admin
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   volumes:
  #     - grafana_data:/var/lib/grafana

volumes:
  caddy_data:
  caddy_config:
  # postgres_data:
  superset_data:
  metabase_data:
  # grafana_data:
  mysql_data:
  sync_reports:
