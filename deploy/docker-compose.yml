services:
  caddy:
    image: caddy:latest
    # Opt-in: start with `docker compose --profile proxy up -d` or
    # COMPOSE_PROFILES=proxy in .env. Plain `docker compose up -d` skips caddy,
    # which is useful while DNS isn't pointed at the VPS (Let's Encrypt cannot
    # issue certs for a raw IP, so auto-HTTPS fails and the browser hangs).
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Managed TLS certs & runtime state live in named volumes so the
      # container never writes into the rsync-managed deploy tree.
      - caddy_data:/data
      - caddy_config:/config
      # Config-as-code: single file, read-only. Caddy cannot mutate the
      # surrounding ./caddy_config directory because we only bind the file.
      - ./caddy_config/Caddyfile:/etc/caddy/Caddyfile:ro


  mysql:
    image: mysql:8.0
    container_name: hiretrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # postgres:
  #   image: postgres:16
  #   container_name: hiretrack-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-hiretrack}
  #     POSTGRES_USER: ${POSTGRES_USER:-hiretrack}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiretrack123}
  #   ports:
