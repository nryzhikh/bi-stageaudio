---
# Bootstrap-only settings for the Linux VPS. Runtime deployment is controlled
# from deploy/docker-compose.yml and deploy/.env on the host.
#
# IMPORTANT: deploy_root MUST be the parent of DEPLOY_DIR in deploy/.env.*
#   DEPLOY_DIR = "{{ deploy_root }}/deploy"
# If you change one, change the other — otherwise deploy.sh will rsync into a
# directory that bootstrap never created (or vice versa).

deploy_root: /opt/bi-stageaudio

# Linux user/group that should own the deploy tree.
deploy_owner: "{{ ansible_user }}"
deploy_group: "{{ ansible_user }}"

# Base packages for the VPS.
bootstrap_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - rsync
  - ufw

# UFW ports to open publicly on the VPS.
# Only SSH + HTTP(S). Everything else (superset, metabase, cloudbeaver) is
# published via Caddy reverse-proxy on :443 so individual service ports stay
# firewalled off from the internet. CloudBeaver, in particular, binds to
# 127.0.0.1:8978 in compose and is only reachable through db.<domain>.
public_tcp_ports:
  - 22
  - 80
  - 443
