---
# Bootstrap-only settings for the Linux VPS. Runtime deployment is controlled
# from deploy/docker-compose.yml and deploy/.env on the host.

# Base packages for the VPS.
hiretrack_bootstrap_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - rsync
  - ufw

# UFW ports to open publicly on the VPS.
# NOTE: exposing adminer (8080), superset (8088), metabase (3000), and Ofelia
# logs/UI-adjacent traffic should be scoped in the provider firewall if possible.
# Re-enable caddy via docker compose when DNS is ready.
hiretrack_public_tcp_ports:
  - 22
  - 80
  - 443
  - 3000
  - 8080
  - 8088
