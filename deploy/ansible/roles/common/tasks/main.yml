---
- name: Install base apt packages
  ansible.builtin.apt:
    name: "{{ bootstrap_packages }}"
    state: present
    update_cache: true

- name: Create deployment root
  ansible.builtin.file:
    path: "{{ deploy_root }}"
    state: directory
    owner: "{{ deploy_owner }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Create deploy data directories
  ansible.builtin.file:
    path: "{{ deploy_root }}/{{ item }}"
    state: directory
    owner: "{{ deploy_owner }}"
    group: "{{ deploy_group }}"
    mode: "0755"
  loop:
    - deploy
    - deploy/caddy_config
    - var
    - var/artifacts

- name: Allow public TCP ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ public_tcp_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
