[defaults]
inventory = inventory/production/hosts.yml
host_key_checking = False
# Modern replacement for the removed community.general.yaml callback (ansible-core >=2.13).
stdout_callback = ansible.builtin.default
result_format = yaml
callbacks_enabled = ansible.posix.profile_tasks
interpreter_python = auto_silent
retry_files_enabled = False
# Forward-compat: stop injecting ansible_* facts as top-level vars (default becomes False in 2.24).
# All our roles read ansible_facts['name'] instead.
inject_facts_as_vars = false
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ~/.ansible/facts
fact_caching_timeout = 86400

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[persistent_connection]
command_timeout = 60
